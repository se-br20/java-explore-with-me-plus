server:
  port: 0

spring:
  application:
    name: stats-server-test

  config:
    import: "optional:configserver:"

  cloud:
    config:
      enabled: false
      discovery:
        enabled: false

    discovery:
      enabled: false

  datasource:
    url: jdbc:h2:mem:stats-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: always

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  health:
    config:
      enabled: false

logging:
  level:
    com.netflix.discovery: OFF
    org.springframework.cloud.config: OFF