server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ewm
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

stats-server:
  url: http://localhost:9090

logging:
  level:
    ru.practicum.ewm: DEBUG
    org.hibernate.SQL: DEBUG

app:
  name: ewm-main-service