services:

  discovery-server:
    build:
      context: ./infra/discovery-server
    container_name: discovery-server
    restart: on-failure

    ports:
      - "8761:8761"

    environment:
      SERVER_PORT: "8761"

    healthcheck:
      test:
        - CMD-SHELL
        - bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8761'
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s


  config-server:
    build:
      context: ./infra/config-server
    container_name: config-server
    restart: on-failure

    depends_on:
      discovery-server:
        condition: service_healthy

    environment:
      SERVER_PORT: "0"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"


  stats-db:
    image: postgres:16.1
    container_name: stats-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - stats-db-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -q -d "$$POSTGRES_DB" -U "$$POSTGRES_USER"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s


  ewm-db:
    image: postgres:16.1
    container_name: ewm-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - ewm-db-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -q -d "$$POSTGRES_DB" -U "$$POSTGRES_USER"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s


  stats-server:
    build:
      context: ./stats-service/stats-server
    container_name: stats-server
    restart: on-failure

    depends_on:
      discovery-server:
        condition: service_healthy
      stats-db:
        condition: service_healthy
      config-server:
        condition: service_started

    environment:
      SERVER_PORT: "0"

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres


  main-service:
    build:
      context: ./core/main-service
    container_name: main-service
    restart: on-failure

    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_started
      stats-server:
        condition: service_started
      ewm-db:
        condition: service_healthy

    environment:
      SERVER_PORT: "0"

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      STATS_SERVER_URL: http://stats-server


  gateway-server:
    build:
      context: ./infra/gateway-server
    container_name: gateway-server
    restart: on-failure

    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_started
      main-service:
        condition: service_started

    ports:
      - "8080:8080"

    environment:
      SERVER_PORT: "8080"

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"


volumes:
  stats-db-data:
  ewm-db-data: