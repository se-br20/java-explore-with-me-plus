services:
  discovery-server:
    build:
      context: ./infra/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      SPRING_APPLICATION_NAME: discovery-server
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8761/actuator/health | grep UP" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  config-server:
    build:
      context: ./infra/config-server
    container_name: config-server
    depends_on:
      discovery-server:
        condition: service_healthy
    expose:
      - "8888"
    environment:
      SERVER_PORT: 8888
      SPRING_APPLICATION_NAME: config-server
      SPRING_PROFILES_ACTIVE: native
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8888/actuator/health | grep UP" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  stats-db:
    image: postgres:16.1
    container_name: stats-db
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d stats" ]
      interval: 5s
      timeout: 5s
      retries: 30

  ewm-db:
    image: postgres:16.1
    container_name: ewm-db
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ewm" ]
      interval: 5s
      timeout: 5s
      retries: 30

  stats-server:
    build:
      context: ./stats-service/stats-server
    container_name: stats-server
    depends_on:
      config-server:
        condition: service_healthy
      stats-db:
        condition: service_healthy
    expose:
      - "9090"
    environment:
      SERVER_PORT: 9090
      SPRING_APPLICATION_NAME: stats-server
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:9090/actuator/health | grep UP" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  ewm-service:
    build:
      context: ./core/main-service
    container_name: ewm-service
    depends_on:
      config-server:
        condition: service_healthy
      ewm-db:
        condition: service_healthy
      stats-server:
        condition: service_healthy
    expose:
      - "8081"
    environment:
      SERVER_PORT: 8081
      SPRING_APPLICATION_NAME: main-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8081/actuator/health | grep UP" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  gateway-server:
    build:
      context: ./infra/gateway-server
    container_name: gateway-server
    depends_on:
      config-server:
        condition: service_healthy
      ewm-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_APPLICATION_NAME: gateway-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health | grep UP" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s