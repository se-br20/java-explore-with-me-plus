services:

  discovery-server:
    build:
      context: ./infra/discovery-server
    container_name: discovery-server
    restart: on-failure

    ports:
      - "8761:8761"

    environment:
      SERVER_PORT: "8761"
      SERVER_ADDRESS: "0.0.0.0"
      SPRING_APPLICATION_NAME: discovery-server

    healthcheck:
      test:
        - CMD-SHELL
        - bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8761'
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s


  config-server:
    build:
      context: ./infra/config-server
    container_name: config-server
    restart: on-failure

    depends_on:
      discovery-server:
        condition: service_healthy

    environment:
      SERVER_PORT: "8888"
      SERVER_ADDRESS: "0.0.0.0"
      SPRING_APPLICATION_NAME: config-server
      SPRING_PROFILES_ACTIVE: native

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      EUREKA_CLIENT_REGISTRY_FETCH_INTERVAL_SECONDS: "3"
      EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: "3"
      EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: "10"

    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec '
          exec 3<>/dev/tcp/discovery-server/8761;
          printf "GET /eureka/apps/CONFIG-SERVER HTTP/1.1\r\nHost: discovery-server\r\nAccept: application/json\r\nConnection: close\r\n\r\n" >&3;
          grep -q "\"name\":\"CONFIG-SERVER\"" <&3
          '
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s

  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    hostname: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_LISTENERS: >-
        CONTROLLER://0.0.0.0:9093,
        INTERNAL://0.0.0.0:29092,
        EXTERNAL://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: >-
        INTERNAL://kafka:29092,
        EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        CONTROLLER:PLAINTEXT,
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

    healthcheck:
      test:
        - CMD-SHELL
        - >
          /opt/kafka/bin/kafka-topics.sh
          --bootstrap-server localhost:29092
          --list
          > /dev/null 2>&1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  kafka-init:
    image: apache/kafka:3.8.1
    container_name: kafka-init
    restart: "no"

    depends_on:
      kafka:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c

    command:
      - |
        set -e

        echo "Waiting for Kafka..."

        until /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --list > /dev/null 2>&1
        do
          echo "Kafka is not ready yet..."
          sleep 2
        done

        echo "Creating stats.user-actions.v1..."

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic stats.user-actions.v1 \
          --partitions 1 \
          --replication-factor 1

        echo "Creating stats.events-similarity.v1..."

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic stats.events-similarity.v1 \
          --partitions 1 \
          --replication-factor 1

        echo "Created topics:"

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --list

        echo "Kafka initialization completed."

  collector:
    build:
      context: ./stats-service/collector
      dockerfile: Dockerfile

    container_name: collector
    restart: unless-stopped

    depends_on:
      discovery-server:
        condition: service_healthy

      config-server:
        condition: service_healthy

      kafka-init:
        condition: service_completed_successfully

    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >-
        http://discovery-server:8761/eureka/

      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"

      SERVER_PORT: "8090"

    ports:
      - "8090:8090"

  aggregator:
    build:
      context: ./stats-service/aggregator
      dockerfile: Dockerfile

    container_name: aggregator
    restart: unless-stopped

    depends_on:
      discovery-server:
        condition: service_healthy

      config-server:
        condition: service_healthy

      kafka-init:
        condition: service_completed_successfully

    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >-
        http://discovery-server:8761/eureka/

      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"

      SERVER_PORT: "8091"

    ports:
      - "8091:8091"

    healthcheck:
      test:
        - CMD-SHELL
        - |
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8091; printf "GET /actuator/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3; grep -q "\"status\":\"UP\"" <&3'
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 20s

  analyzer-db:
    image: postgres:16.1
    container_name: analyzer-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -q -d "$$POSTGRES_DB" -U "$$POSTGRES_USER"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

    volumes:
      - analyzer-db-data:/var/lib/postgresql/data

  analyzer:
    build:
      context: ./stats-service/analyzer
      dockerfile: Dockerfile

    container_name: analyzer
    restart: unless-stopped

    depends_on:
      discovery-server:
        condition: service_healthy

      config-server:
        condition: service_healthy

      kafka-init:
        condition: service_completed_successfully

      analyzer-db:
        condition: service_healthy

    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >-
        http://discovery-server:8761/eureka/

      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"

      SPRING_DATASOURCE_URL: >-
        jdbc:postgresql://analyzer-db:5432/analyzer

      SPRING_DATASOURCE_USERNAME: "postgres"
      SPRING_DATASOURCE_PASSWORD: "postgres"

      SERVER_PORT: "8092"

    ports:
      - "8092:8092"

    healthcheck:
      test:
        - CMD-SHELL
        - |
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8092; printf "GET /actuator/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3; grep -q "\"status\":\"UP\"" <&3'
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 30s

  request-db:
    image: postgres:16.1
    container_name: request-db
