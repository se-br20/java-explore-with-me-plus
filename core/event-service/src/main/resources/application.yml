spring:
  application:
    name: event-service

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    registry-fetch-interval-seconds: ${EUREKA_CLIENT_REGISTRY_FETCH_INTERVAL_SECONDS:3}

    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

---
spring:
  config:
    activate:
      on-profile: "!test"

    import: "configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server

    openfeign:
      circuitbreaker:
        enabled: true