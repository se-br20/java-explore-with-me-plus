server:
  port: 0

spring:
  application:
    name: main-service-test

  config:
    import: "optional:configserver:"

  cloud:
    config:
      enabled: false

      discovery:
        enabled: false

    discovery:
      enabled: false

  datasource:
    url: jdbc:h2:mem:ewm-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none

    show-sql: false
    open-in-view: false

    database-platform: org.hibernate.dialect.H2Dialect

    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  health:
    config:
      enabled: false

app:
  name: ewm-main-service

stats-service:
  id: stats-server

logging:
  level:
    ru.practicum.ewm: DEBUG
    org.hibernate.SQL: WARN