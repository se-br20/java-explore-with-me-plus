spring:
  application:
    name: main-service

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

---
spring:
  config:
    activate:
      on-profile: "!test"

    import: "optional:configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server