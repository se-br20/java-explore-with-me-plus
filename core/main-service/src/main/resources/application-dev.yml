server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:ewm-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

logging:
  level:
    ru.practicum.ewm: DEBUG
    org.hibernate.SQL: OFF

stats-server:
  url: http://localhost:9090

app:
  name: ewm-main-service